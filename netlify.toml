# Netlify configuration — Peter Jubb portfolio

[build]
  publish = "."

# Pretty URLs: /case-playnow renders /case-playnow.html
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Aggressive caching for static assets, no caching for HTML
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sensible security defaults
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
